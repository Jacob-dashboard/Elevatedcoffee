<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elevated Coffee — Admin Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --espresso:#2C1810;--espresso-light:#3D2517;--espresso-mid:#4A2E1C;
  --cream:#F5E6D3;--cream-light:#FFF8F0;--gold:#C8A96E;--gold-light:#D4BA85;
  --caramel:#A0714F;--caramel-light:#B8896A;
  --text-primary:#F5E6D3;--text-secondary:#C8A96E;--text-muted:#9A8574;
  --radius:12px;--radius-sm:8px;
}
body{font-family:'Inter',sans-serif;background:var(--espresso);color:var(--text-primary);min-height:100vh;-webkit-font-smoothing:antialiased}
.topbar{background:var(--espresso-light);border-bottom:1px solid rgba(200,169,110,.15);padding:16px 24px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.topbar h1{font-family:'Playfair Display',serif;font-size:1.3rem;color:var(--cream)}
.topbar span{font-size:.75rem;color:var(--text-muted)}
.topbar-actions{display:flex;gap:10px}
.btn{padding:8px 18px;border:none;border-radius:6px;font-size:.8rem;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s}
.btn-gold{background:var(--gold);color:var(--espresso)}
.btn-gold:hover{background:var(--gold-light)}
.btn-outline{background:transparent;border:1px solid var(--gold);color:var(--gold)}
.btn-outline:hover{background:rgba(200,169,110,.1)}
.dashboard{max-width:1100px;margin:0 auto;padding:24px 20px}
/* Stat cards */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:28px}
.stat-card{background:var(--espresso-light);border:1px solid rgba(200,169,110,.12);border-radius:var(--radius);padding:20px;text-align:center}
.stat-value{font-family:'Playfair Display',serif;font-size:2rem;color:var(--gold);font-weight:700}
.stat-label{font-size:.7rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-top:4px}
/* Charts */
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:28px}
@media(max-width:700px){.chart-grid{grid-template-columns:1fr}}
.chart-card{background:var(--espresso-light);border:1px solid rgba(200,169,110,.12);border-radius:var(--radius);padding:24px}
.chart-title{font-family:'Playfair Display',serif;font-size:1rem;color:var(--cream);margin-bottom:16px}
/* Bar chart */
.bar-chart{display:flex;flex-direction:column;gap:12px}
.bar-row{display:flex;align-items:center;gap:10px}
.bar-label{width:100px;font-size:.8rem;color:var(--cream);text-align:right;flex-shrink:0}
.bar-track{flex:1;height:28px;background:rgba(200,169,110,.08);border-radius:4px;overflow:hidden;position:relative}
.bar-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--caramel));border-radius:4px;transition:width .6s ease;display:flex;align-items:center;justify-content:flex-end;padding-right:8px;font-size:.7rem;font-weight:600;color:var(--espresso);min-width:30px}
/* Donut */
.donut-container{display:flex;justify-content:center;align-items:center;gap:20px;flex-wrap:wrap}
.donut-legend{display:flex;flex-direction:column;gap:6px}
.legend-item{display:flex;align-items:center;gap:8px;font-size:.75rem;color:var(--cream)}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
/* Responses table */
.responses-section{background:var(--espresso-light);border:1px solid rgba(200,169,110,.12);border-radius:var(--radius);padding:24px;margin-bottom:28px}
.responses-section h3{font-family:'Playfair Display',serif;font-size:1rem;color:var(--cream);margin-bottom:16px}
.response-card{background:var(--espresso);border:1px solid rgba(200,169,110,.08);border-radius:var(--radius-sm);padding:16px;margin-bottom:10px}
.response-meta{font-size:.7rem;color:var(--text-muted);margin-bottom:6px;display:flex;gap:12px;flex-wrap:wrap}
.response-text{font-size:.85rem;color:var(--cream);line-height:1.5;font-style:italic}
.no-data{text-align:center;color:var(--text-muted);padding:40px 20px;font-size:.9rem}
canvas{max-width:100%}
</style>
</head>
<body>

<div class="topbar">
  <div>
    <h1>Elevated Coffee — Review Dashboard</h1>
    <span id="lastUpdated"></span>
  </div>
  <div class="topbar-actions">
    <button class="btn btn-outline" onclick="loadData()">Refresh</button>
    <button class="btn btn-gold" onclick="exportCSV()">Export CSV</button>
  </div>
</div>

<div class="dashboard">
  <!-- Stats -->
  <div class="stats" id="statsGrid">
    <div class="stat-card"><div class="stat-value" id="totalCount">0</div><div class="stat-label">Total Responses</div></div>
    <div class="stat-card"><div class="stat-value" id="avgBlack">—</div><div class="stat-label">Avg. Black Coffee</div></div>
    <div class="stat-card"><div class="stat-value" id="avgVanilla">—</div><div class="stat-label">Avg. Vanilla Oat</div></div>
    <div class="stat-card"><div class="stat-value" id="avgCaramel">—</div><div class="stat-label">Avg. Caramel Latte</div></div>
    <div class="stat-card"><div class="stat-value" id="avgWebA">—</div><div class="stat-label">Website Aesthetics</div></div>
    <div class="stat-card"><div class="stat-value" id="avgWebF">—</div><div class="stat-label">Website Function</div></div>
  </div>

  <div class="chart-grid">
    <!-- Flavor Ratings Bar Chart -->
    <div class="chart-card">
      <div class="chart-title">Average Flavor Ratings</div>
      <div class="bar-chart" id="flavorBars"></div>
    </div>
    <!-- Price Distribution -->
    <div class="chart-card">
      <div class="chart-title">Price Sensitivity</div>
      <div class="bar-chart" id="priceBars"></div>
    </div>
    <!-- Age Distribution -->
    <div class="chart-card">
      <div class="chart-title">Age Distribution</div>
      <div class="bar-chart" id="ageBars"></div>
    </div>
    <!-- Can Size Preference -->
    <div class="chart-card">
      <div class="chart-title">Can Size Preference</div>
      <div class="bar-chart" id="canSizeBars"></div>
    </div>
    <!-- Calorie Importance -->
    <div class="chart-card">
      <div class="chart-title">Calorie Importance</div>
      <div class="bar-chart" id="calorieBars"></div>
    </div>
    <!-- Adaptogen Awareness -->
    <div class="chart-card">
      <div class="chart-title">Adaptogen Awareness</div>
      <div class="bar-chart" id="adaptogenBars"></div>
    </div>
  </div>

  <!-- Free-text Responses -->
  <div class="responses-section">
    <h3>Reviews &amp; Feedback</h3>
    <div id="responsesList"></div>
  </div>
</div>

<script>
let allData = [];

function loadData() {
  allData = JSON.parse(localStorage.getItem('elevatedReviews') || '[]');
  document.getElementById('lastUpdated').textContent = 'Last updated: ' + new Date().toLocaleTimeString() + ' · ' + allData.length + ' responses';
  render();
}

function avg(arr) {
  const nums = arr.filter(v => typeof v === 'number' && v > 0);
  if (!nums.length) return null;
  return (nums.reduce((a,b) => a+b, 0) / nums.length).toFixed(1);
}

function countBy(arr, key) {
  const counts = {};
  arr.forEach(r => { const v = r[key] || '(blank)'; counts[v] = (counts[v] || 0) + 1; });
  return counts;
}

function makeBar(label, value, max) {
  const pct = max > 0 ? Math.round((value / max) * 100) : 0;
  return `<div class="bar-row">
    <div class="bar-label">${label}</div>
    <div class="bar-track"><div class="bar-fill" style="width:${Math.max(pct, 8)}%">${value}</div></div>
  </div>`;
}

function makeBarRating(label, value) {
  const pct = value ? Math.round((value / 5) * 100) : 0;
  return `<div class="bar-row">
    <div class="bar-label">${label}</div>
    <div class="bar-track"><div class="bar-fill" style="width:${Math.max(pct, 8)}%">${value ? value + '/5' : '—'}</div></div>
  </div>`;
}

function render() {
  const n = allData.length;
  document.getElementById('totalCount').textContent = n;

  // Averages
  const bAvg = avg(allData.map(r => r.blackCoffee));
  const vAvg = avg(allData.map(r => r.vanillaOat));
  const cAvg = avg(allData.map(r => r.caramelLatte));
  const waAvg = avg(allData.map(r => r.websiteAesthetics));
  const wfAvg = avg(allData.map(r => r.websiteFunctionality));

  document.getElementById('avgBlack').textContent = bAvg ? bAvg + '/5' : '—';
  document.getElementById('avgVanilla').textContent = vAvg ? vAvg + '/5' : '—';
  document.getElementById('avgCaramel').textContent = cAvg ? cAvg + '/5' : '—';
  document.getElementById('avgWebA').textContent = waAvg ? waAvg + '/5' : '—';
  document.getElementById('avgWebF').textContent = wfAvg ? wfAvg + '/5' : '—';

  // Flavor bar chart
  document.getElementById('flavorBars').innerHTML =
    makeBarRating('Black Coffee', bAvg) +
    makeBarRating('Vanilla Oat', vAvg) +
    makeBarRating('Caramel Latte', cAvg);

  // Price distribution
  const priceRanges = ['$3.75-$4.00','$4.01-$4.25','$4.26-$4.50','$4.51-$4.75','$4.76-$5.00'];
  const priceCounts = countBy(allData, 'price');
  const maxPrice = Math.max(...priceRanges.map(p => priceCounts[p] || 0), 1);
  document.getElementById('priceBars').innerHTML = priceRanges.map(p =>
    makeBar(p, priceCounts[p] || 0, maxPrice)
  ).join('');

  // Age distribution
  const ageRanges = ['Under 21','21-25','26-30','31-35','36-40','41-50','51+'];
  const ageCounts = countBy(allData, 'ageRange');
  const maxAge = Math.max(...ageRanges.map(a => ageCounts[a] || 0), 1);
  document.getElementById('ageBars').innerHTML = ageRanges.map(a =>
    makeBar(a, ageCounts[a] || 0, maxAge)
  ).join('');

  // Can size preference
  const canSizes = ['8.4 oz (slim can)', '12 oz (standard can)'];
  const canCounts = countBy(allData, 'canSize');
  const maxCan = Math.max(...canSizes.map(s => canCounts[s] || 0), 1);
  document.getElementById('canSizeBars').innerHTML = canSizes.map(s =>
    makeBar(s, canCounts[s] || 0, maxCan)
  ).join('');

  // Calorie importance
  const calLevels = ['Very important', 'Somewhat important', 'Not important'];
  const calCounts = countBy(allData, 'calorieImportance');
  const maxCal = Math.max(...calLevels.map(l => calCounts[l] || 0), 1);
  document.getElementById('calorieBars').innerHTML = calLevels.map(l =>
    makeBar(l, calCounts[l] || 0, maxCal)
  ).join('');

  // Adaptogen awareness
  const adaptogens = [
    { key: 'adaptogen_ashwagandha', label: 'Ashwagandha' },
    { key: 'adaptogen_lionsMane', label: "Lion's Mane" },
    { key: 'adaptogen_lTheanine', label: 'L-Theanine' }
  ];
  document.getElementById('adaptogenBars').innerHTML = adaptogens.map(a => {
    const yesCount = allData.filter(r => r[a.key] === 'yes').length;
    const total = allData.filter(r => r[a.key] === 'yes' || r[a.key] === 'no').length;
    const pct = total > 0 ? Math.round((yesCount / total) * 100) : 0;
    return `<div class="bar-row">
      <div class="bar-label">${a.label}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.max(pct, 8)}%">${pct}% aware</div></div>
    </div>`;
  }).join('');

  // Responses
  const list = document.getElementById('responsesList');
  const withText = allData.filter(r => r.reviewText || r.suggestions).reverse();
  if (!withText.length) {
    list.innerHTML = '<div class="no-data">No text responses yet.</div>';
    return;
  }
  list.innerHTML = withText.map(r => {
    const date = r.timestamp ? new Date(r.timestamp).toLocaleString() : '';
    const age = r.ageRange || '—';
    const price = r.price || '—';
    let text = '';
    if (r.reviewText) text += r.reviewText;
    if (r.suggestions) text += (text ? '<br><br><strong>Suggestions:</strong> ' : '') + r.suggestions;
    return `<div class="response-card">
      <div class="response-meta"><span>${date}</span><span>Age: ${age}</span><span>Price: ${price}</span></div>
      <div class="response-text">${text}</div>
    </div>`;
  }).join('');
}

function exportCSV() {
  if (!allData.length) { alert('No responses to export.'); return; }
  const headers = Object.keys(allData[0]);
  const csv = [headers.join(','), ...allData.map(row => headers.map(h => {
    let v = row[h] ?? '';
    v = String(v).replace(/"/g, '""');
    return `"${v}"`;
  }).join(','))].join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'elevated-coffee-reviews-' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
}

loadData();
</script>
</body>
</html>
